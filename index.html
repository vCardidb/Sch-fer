<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stephan Schäfer | Identbase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #b7e4c7 0%, #95d5b2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            max-width: 550px;
            width: 100%;
            padding: 45px 40px;
            border-radius: 24px;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.25);
            text-align: center;
            border-top: 5px solid #52b788;
        }

        .logo-container {
            margin-bottom: 30px;
            padding: 20px;
            background: #f1fff5;
            border-radius: 16px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-container img {
            transform: scale(1.8);
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: inline-block;
            object-fit: contain;
        }

        .name {
            font-size: 2.5rem;
            font-weight: 500;
            color: #1b4332;
            line-height: 1.2;
            margin-bottom: 5px;
            font-family: 'Georgia', serif;
        }

        .title {
            font-size: 1.2rem;
            color: #40916c;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .company {
            font-size: 1.2rem;
            color: #52796f;
            font-weight: 400;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #d8f3dc;
        }

        .detail {
            margin: 30px 0;
            text-align: left;
            background: #f1fff5;
            padding: 25px;
            border-radius: 16px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            margin: 18px 0;
            font-size: 1.1rem;
        }

        .emoji {
            font-size: 1.5rem;
            margin-right: 18px;
            min-width: 35px;
            text-align: center;
            color: #40916c;
        }

        .text {
            color: #2d4739;
            word-break: break-word;
            line-height: 1.4;
        }

        .label {
            font-weight: 600;
            color: #40916c;
            margin-right: 8px;
            min-width: 50px;
        }

        .email {
            color: #2d6a4f;
            text-decoration: none;
            font-weight: 500;
        }

        .email:hover {
            text-decoration: underline;
        }

        .website {
            text-align: center;
            margin: 20px 0 30px;
        }

        .website a {
            color: #2d6a4f;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.3rem;
            border-bottom: 2px solid #95d5b2;
            padding-bottom: 4px;
        }

        .website a:hover {
            border-bottom-color: #2d6a4f;
        }

        .vcard-button {
            display: inline-block;
            background: #52b788;
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 500;
            margin: 5px 0 15px;
            box-shadow: 0 6px 14px rgba(82, 183, 136, 0.25);
            transition: all 0.2s;
            width: 100%;
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
        }

        .vcard-button:hover {
            background: #40916c;
            box-shadow: 0 8px 18px rgba(82, 183, 136, 0.35);
            transform: translateY(-2px);
        }

        .vcard-button:active {
            transform: translateY(0);
        }

        .hint {
            color: #6c8f7b;
            font-size: 0.9rem;
            margin-top: 15px;
        }

        .location {
            font-weight: 600;
            color: #1b4332;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            .name {
                font-size: 2rem;
            }

            .title,
            .company {
                font-size: 1rem;
            }

            .logo-container {
                min-height: 150px;
            }
        }
    </style>
</head>

<body>
    <div class="card">

        <div class="logo-container">
            <!-- Optional: Firmenlogo einsetzen -->
            <img src="identbase-logo.png" alt="Identbase"
                onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='block';">

            <!-- Fallback -->
            <div id="fallback-logo"
                style="display: none; font-size: 2.2rem; font-weight: 600; color: #2d6a4f; letter-spacing: 1px;">
                IDENTBASE
            </div>
        </div>

        <h1 class="name">Stephan Schäfer</h1>
        <div class="title">Product Specialist</div>
        <div class="company">Identbase GmbH</div>

        <div class="detail">

            <div class="detail-item">
                <span class="emoji">📞</span>
                <span class="text">
                    <span class="label">Tel:</span>
                    +49 5931 99 89 1356
                </span>
            </div>

            <div class="detail-item">
                <span class="emoji">✉️</span>
                <span class="text">
                    <span class="label">Mail:</span>
                    <a href="mailto:schaefer@identbase.de" class="email">
                        schaefer@identbase.de
                    </a>
                </span>
            </div>

        </div>

        <div class="website">
            <a href="https://www.identbase.de" target="_blank">
                www.identbase.de
            </a>
        </div>

        <a href="Stephan-Schaefer.vcf" class="vcard-button" rel="noopener noreferrer">
            ⬇️ Kontakt speichern (vCard)
        </a>

        <div class="hint">
            Klicken Sie hier, um die Kontaktdaten auf Ihrem Gerät zu speichern
        </div>

        <div class="location">
            Product Specialist • Identbase
        </div>

    </div>

    <script>
        window.onload = function () {
            var img = document.querySelector('.logo-container img');

            if (img && img.complete && img.naturalHeight === 0) {
                img.style.display = 'none';
                document.getElementById('fallback-logo').style.display = 'block';
            }
        }
    </script>
</body>
</html>
